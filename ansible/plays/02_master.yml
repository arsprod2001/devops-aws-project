# plays/02_master.yml
# Play 2 : Bootstrap du control plane Kubernetes (MASTER uniquement)
# - kubeadm init sans kube-proxy (Cilium eBPF le remplace)
# - Installation Cilium CLI + Hubble CLI
# - Déploiement Cilium via Helm avec métriques Hubble activées
# - Remédiation automatique si CrashLoopBackOff détecté
# - Génération du token join pour le worker

- name: control plane Kubernetes
  hosts: master
  become: true

  tasks:

    # ── Initialisation K8s ─────────────────────────────────────
    - name: Verifier si le cluster est deja initialise
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Lancer kubeadm init sans kube-proxy
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr=10.244.0.0/16 \
          --apiserver-advertise-address={{ ansible_default_ipv4.address }} \
          --skip-phases=addon/kube-proxy \
          --ignore-preflight-errors=NumCPU,Mem
      when: not k8s_admin_conf.stat.exists

    - name: Creer le repertoire .kube pour ubuntu
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copier admin.conf vers .kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    # ── CLIs Cilium et Hubble ──────────────────────────────────
    - name: Installer Hubble CLI
      ansible.builtin.shell: |
        HUBBLE_VERSION=$(curl -s \
          https://raw.githubusercontent.com/cilium/hubble/master/stable.txt)
        curl -L --fail \
          https://github.com/cilium/hubble/releases/download/${HUBBLE_VERSION}/hubble-linux-amd64.tar.gz \
          -o /tmp/hubble.tar.gz
        tar xzvf /tmp/hubble.tar.gz -C /usr/local/bin
        chmod +x /usr/local/bin/hubble
      args:
        creates: /usr/local/bin/hubble

    - name: Installer Cilium CLI
      ansible.builtin.shell: |
        CILIUM_CLI_VERSION=$(curl -s \
          https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L --fail \
          https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz \
          -o /tmp/cilium.tar.gz
        tar xzvf /tmp/cilium.tar.gz -C /usr/local/bin
        chmod +x /usr/local/bin/cilium
      args:
        creates: /usr/local/bin/cilium

    # ── Cilium via Helm ────────────────────────────────────────
    - name: Ajouter le repo Helm Cilium
      ansible.builtin.shell: |
        helm repo add cilium https://helm.cilium.io/ && helm repo update
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Deployer Cilium avec Hubble et metriques actives
      ansible.builtin.shell: |
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ ansible_default_ipv4.address }} \
          --set k8sServicePort=6443 \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="10.244.0.0/16" \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}" \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true \
          --wait \
          --timeout=10m
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: not k8s_admin_conf.stat.exists

    # ── Attente et remédiation Cilium ──────────────────────────
    - name: Attendre l apparition des pods Cilium
      ansible.builtin.shell: |
        for i in $(seq 1 20); do
          COUNT=$(kubectl get pods -n kube-system \
            -l k8s-app=cilium --no-headers 2>/dev/null | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "Pods Cilium detectes : $COUNT"
            exit 0
          fi
          echo "Attente pods Cilium... ($i/20)"
          sleep 15
        done
        exit 1
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Attendre que le DaemonSet Cilium soit Ready
      ansible.builtin.shell: |
        kubectl rollout status daemonset/cilium \
          -n kube-system --timeout=600s
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_wait
      failed_when: false

    - name: Detecter un eventuel CrashLoopBackOff Cilium
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l k8s-app=cilium \
          --no-headers 2>/dev/null \
          | grep -c "CrashLoopBackOff" || echo "0"
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_crash_count
      failed_when: false

    - name: Relancer Cilium si CrashLoopBackOff detecte
      ansible.builtin.shell: |
        echo "CrashLoopBackOff detecte — reinstallation..."
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ ansible_default_ipv4.address }} \
          --set k8sServicePort=6443 \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="10.244.0.0/16" \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}" \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true \
          --force \
          --timeout=10m
        kubectl rollout status daemonset/cilium \
          -n kube-system --timeout=600s
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: cilium_crash_count.stdout | int > 0

    - name: Statut Cilium et noeuds
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l k8s-app=cilium -o wide
        echo "---"
        kubectl get nodes
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_status
      failed_when: false

    - name: Afficher statut Cilium
      ansible.builtin.debug:
        msg: "{{ cilium_status.stdout_lines }}"

    # ── Token join pour le worker ──────────────────────────────
    - name: Generer le token join
      ansible.builtin.shell: kubeadm token create --print-join-command
      register: join_command

    - name: Sauvegarder le token join en local
      ansible.builtin.copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/k8s_join_command.sh
      delegate_to: localhost
      become: false

    - name: Master pret
      ansible.builtin.debug:
        msg: "Control plane operationnel — Cilium + Hubble actifs"
