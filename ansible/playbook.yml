# playbook.yml — NetPulse : Cluster K8s + Cilium + Prometheus + Grafana
# Stack : Terraform → AWS EC2 → Ansible → K8s + Cilium/Hubble + Monitoring
# Version finale — toutes corrections integrees

# ═══════════════════════════════════════════════════════════════
# PLAY 1 : Configuration de base 
# ═══════════════════════════════════════════════════════════════
- name: Configuration des noeud kubrnetes
  hosts: k8s_nodes
  become: true
  gather_facts: true

  tasks:
    - name: Arrêter tous les processus apt/dpkg en cours.
      ansible.builtin.shell: |
        killall -9 apt apt-get dpkg 2>/dev/null || true
        fuser -k /var/lib/dpkg/lock-frontend 2>/dev/null || true
        rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock 2>/dev/null || true
        dpkg --configure -a 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Mettre a jour la liste des packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: apt_update
      until: apt_update is success

    - name: Installer les paquets essentiels
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - vim
          - htop
          - net-tools
          - jq
          - python3-pip
        state: present
      retries: 3
      delay: 10

    - name: Creer le repertoire pour les cles GPG
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Ajouter la cle GPG de Docker
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Ajouter le depot Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Installer Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
      retries: 3
      delay: 10

    - name: Supprimer la config containerd par defaut
      ansible.builtin.file:
        path: /etc/containerd/config.toml
        state: absent

    - name: Generer une config containerd propre
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml

    - name: Activer SystemdCgroup dans containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"

    - name: Redemarrer containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        daemon_reload: true

    - name: Demarrer Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ajouter ubuntu au groupe docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Ajouter la cle GPG Kubernetes
      ansible.builtin.apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: present

    - name: Ajouter le depot Kubernetes
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
        state: present

    - name: Installer kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
      retries: 3
      delay: 10

    - name: Bloquer les versions K8s
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Activer kubelet
      ansible.builtin.systemd:
        name: kubelet
        state: started
        enabled: true

    - name: Installer Helm
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

# ═══════════════════════════════════════════════════════════════
# PLAY 2 : Initialisation du MASTER
# ═══════════════════════════════════════════════════════════════
- name: Initialisation du noeud Master Kubernetes
  hosts: master
  become: true

  tasks:
    - name: Verifier si le cluster est deja initialise
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Initialiser le cluster sans kube-proxy (Cilium eBPF le remplace)
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr=10.244.0.0/16 \
          --apiserver-advertise-address={{ ansible_default_ipv4.address }} \
          --skip-phases=addon/kube-proxy \
          --ignore-preflight-errors=NumCPU,Mem
      when: not k8s_admin_conf.stat.exists

    - name: Creer le repertoire .kube
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copier le kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Installer Cilium CLI
      ansible.builtin.shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L --fail \
          https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz \
          -o /tmp/cilium.tar.gz
        tar xzvf /tmp/cilium.tar.gz -C /usr/local/bin
        chmod +x /usr/local/bin/cilium
      args:
        creates: /usr/local/bin/cilium

    - name: Installer Hubble CLI
      ansible.builtin.shell: |
        HUBBLE_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/hubble/master/stable.txt)
        curl -L --fail \
          https://github.com/cilium/hubble/releases/download/${HUBBLE_VERSION}/hubble-linux-amd64.tar.gz \
          -o /tmp/hubble.tar.gz
        tar xzvf /tmp/hubble.tar.gz -C /usr/local/bin
        chmod +x /usr/local/bin/hubble
      args:
        creates: /usr/local/bin/hubble

    - name: Ajouter le repo Helm Cilium
      ansible.builtin.shell: helm repo add cilium https://helm.cilium.io/ && helm repo update
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Installer Cilium avec Hubble active
      ansible.builtin.shell: |
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ ansible_default_ipv4.address }} \
          --set k8sServicePort=6443 \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}" \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="10.244.0.0/16" \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --wait \
          --timeout=10m
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: not k8s_admin_conf.stat.exists

    - name: Attendre que les pods Cilium existent
      ansible.builtin.shell: |
        for i in $(seq 1 20); do
          COUNT=$(kubectl get pods -n kube-system -l k8s-app=cilium --no-headers 2>/dev/null | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "Cilium pods detectes: $COUNT"
            exit 0
          fi
          echo "Attente pods Cilium... ($i/20)"
          sleep 15
        done
        exit 1
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Attendre que Cilium soit pret (10min max)
      ansible.builtin.shell: |
        kubectl rollout status daemonset/cilium -n kube-system --timeout=600s
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_wait
      failed_when: false

    - name: Verifier si Cilium est en CrashLoopBackOff
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l k8s-app=cilium --no-headers 2>/dev/null \
          | grep -c "CrashLoopBackOff" || echo "0"
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_crash_count
      failed_when: false

    - name: Reinstaller Cilium si CrashLoopBackOff detecte
      ansible.builtin.shell: |
        echo "CrashLoopBackOff detecte — reinstallation..."
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ ansible_default_ipv4.address }} \
          --set k8sServicePort=6443 \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}" \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="10.244.0.0/16" \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --force \
          --timeout=10m
        kubectl rollout status daemonset/cilium -n kube-system --timeout=600s
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: cilium_crash_count.stdout | int > 0

    - name: Statut Cilium
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l k8s-app=cilium -o wide
        echo "---"
        kubectl get nodes
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: cilium_status
      failed_when: false

    - name: Afficher statut Cilium
      ansible.builtin.debug:
        msg: "{{ cilium_status.stdout_lines }}"

    - name: Generer la commande join
      ansible.builtin.shell: kubeadm token create --print-join-command
      register: join_command

    - name: Sauvegarder la commande join localement
      ansible.builtin.copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/k8s_join_command.sh
      delegate_to: localhost
      become: false

    - name: Confirmer master pret
      ansible.builtin.debug:
        msg: "Master pret — Cilium + Hubble installes"

# ═══════════════════════════════════════════════════════════════
# PLAY 3 : Joindre les WORKERS
# ═══════════════════════════════════════════════════════════════
- name: Joindre les noeuds Workers
  hosts: workers
  become: true

  tasks:
    - name: Verifier si le worker a deja rejoint
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Lire la commande join
      ansible.builtin.set_fact:
        join_cmd: "{{ lookup('file', '/tmp/k8s_join_command.sh') }}"
      when: not kubelet_conf.stat.exists

    - name: Rejoindre le cluster
      ansible.builtin.shell: "{{ join_cmd }} --ignore-preflight-errors=NumCPU,Mem"
      when: not kubelet_conf.stat.exists
      register: join_result

    - name: Resultat du join
      ansible.builtin.debug:
        msg: "{{ join_result.stdout_lines | default(['Worker deja dans le cluster']) }}"

# ═══════════════════════════════════════════════════════════════
# PLAY 4 : Prometheus + Grafana
# ═══════════════════════════════════════════════════════════════
- name: Deploiement du stack Prometheus + Grafana
  hosts: master
  become_user: ubuntu
  gather_facts: false

  tasks:
    - name: Creer les namespaces
      ansible.builtin.shell: |
        kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace netpulse --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Ajouter le repo prometheus-community
      ansible.builtin.shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Installer kube-prometheus-stack
      ansible.builtin.shell: |
        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.enabled=true \
          --set grafana.adminPassword=netpulse2025 \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=31000 \
          --set prometheus.service.type=NodePort \
          --set prometheus.service.nodePort=31001 \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false \
          --wait \
          --timeout=10m
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Appliquer les PodMonitors Cilium + Hubble
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: monitoring.coreos.com/v1
        kind: PodMonitor
        metadata:
          name: cilium-agent
          namespace: monitoring
          labels:
            release: kube-prometheus-stack
        spec:
          selector:
            matchLabels:
              k8s-app: cilium
          namespaceSelector:
            matchNames:
              - kube-system
          podMetricsEndpoints:
            - port: prometheus
              interval: 15s
              path: /metrics
        ---
        apiVersion: monitoring.coreos.com/v1
        kind: PodMonitor
        metadata:
          name: hubble-relay
          namespace: monitoring
          labels:
            release: kube-prometheus-stack
        spec:
          selector:
            matchLabels:
              k8s-app: hubble-relay
          namespaceSelector:
            matchNames:
              - kube-system
          podMetricsEndpoints:
            - port: prometheus
              interval: 15s
              path: /metrics
        EOF
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

# ═══════════════════════════════════════════════════════════════
# PLAY 5 : Application Dashboard
# ═══════════════════════════════════════════════════════════════
- name: Deploiement de l application Dashboard
  hosts: master
  become_user: ubuntu
  gather_facts: false

  tasks:
    - name: Creer le repertoire des manifests
      ansible.builtin.file:
        path: /home/ubuntu/k8s-manifests
        state: directory

    - name: Copier les manifests K8s
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../k8s/"
        dest: /home/ubuntu/k8s-manifests/
      ignore_errors: true

    - name: Recuperer le noeud worker
      ansible.builtin.shell: |
        kubectl get nodes \
          --selector='!node-role.kubernetes.io/control-plane' \
          -o jsonpath='{.items[0].metadata.name}'
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: worker_node_name

    - name: Creer le PersistentVolume PostgreSQL sur le worker
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: postgres-pv
        spec:
          capacity:
            storage: 2Gi
          accessModes:
            - ReadWriteOnce
          hostPath:
            path: /mnt/data/postgres
          nodeAffinity:
            required:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                  - {{ worker_node_name.stdout }}
        EOF
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      when: worker_node_name.stdout != ""

    - name: Appliquer les manifests NetPulse
      ansible.builtin.shell: |
        for file in /home/ubuntu/k8s-manifests/*.yaml; do
          echo "Applying $file..."
          kubectl apply -f "$file"
        done
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      ignore_errors: true

    - name: Attendre que tous les pods soient prets
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod --all -n netpulse --timeout=300s
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: wait_result
      failed_when: false

    - name: Statut final complet
      ansible.builtin.shell: |
        echo "=== NODES ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== PODS netpulse ==="
        kubectl get pods -n netpulse -o wide
        echo ""
        echo "=== PODS monitoring ==="
        kubectl get pods -n monitoring --no-headers | head -10
        echo ""
        echo "=== SERVICES ==="
        kubectl get svc -n netpulse
        echo ""
        echo "=== CILIUM STATUS ==="
        cilium status --brief 2>/dev/null || kubectl get pods -n kube-system -l k8s-app=cilium
        echo ""
        echo "=== NETWORK POLICIES ==="
        kubectl get ciliumnetworkpolicies -n netpulse
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: final_status
      ignore_errors: true

    - name: Afficher statut final
      ansible.builtin.debug:
        msg: "{{ final_status.stdout_lines }}"

    - name: URLs d acces
      ansible.builtin.debug:
        msg:
          - "NetPulse  : http://{{ ansible_host }}:30000"
          - "Grafana   : http://{{ ansible_host }}:31000  (admin / netpulse2025)"
          - "Prometheus: http://{{ ansible_host }}:31001"
          - "Hubble UI : cilium hubble port-forward && hubble observe -n netpulse --follow"