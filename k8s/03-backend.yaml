# ─── Deployment Backend ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: netpulse
  labels:
    app: backend
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        version: v2
      annotations:
        # Annotation Prometheus pour la découverte automatique
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: backend
          image: arsprod01/netpulse-backend:v2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# ─── Service Backend ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: netpulse
  labels:
    app: backend
  annotations:
    # Prometheus scrape via ServiceMonitor
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30001
  type: NodePort

---
# ─── ServiceMonitor pour Prometheus (kube-prometheus-stack) ─────
# Permet à Prometheus de découvrir et scraper automatiquement le backend
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: netpulse-backend
  namespace: monitoring
  labels:
    release: kube-prometheus-stack   # doit correspondre au label du stack Helm
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - netpulse
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
