# docker-compose.yml — Test local avant déploiement sur AWS
# Démarre NetPulse complet : frontend + backend + postgres

version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: netpulse-db
    environment:
      POSTGRES_DB: netpulsedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netpulse-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: netpulsedb
      DB_USER: postgres
      DB_PASSWORD: password
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netpulse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: